services:
  - type: worker
    name: ipk-content-agent
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MANAGER_CHAT_ID
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAX_BOT_TOKEN
        sync: false
      - key: MAX_CHANNEL_ID
        value: 351000349259_biz
      - key: MODEL
        value: claude-sonnet-4-6
      - key: NODE_ENV
        value: production
